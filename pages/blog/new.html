<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Write a Post — Zero Waste Near Me</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=DM+Sans:wght@300;400;500;600&family=Lora:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --amber:#ffbb53;--amber-d:#f0a830;--mint:#00d8b5;--mint-d:#00b89a;
  --cyan:#00c1ef;--orange:#ff7646;--navy:#04455c;--navy-l:#0a5a78;
  --teal:#1d93a3;--text:#1c2f38;--muted:#6b8c99;--border:#e0eff3;--light:#f4fbfa;
  --green:#059669;--red:#dc2626;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:#f0f4f8;color:var(--text);min-height:100vh}

/* HEADER */
.editor-header{background:var(--navy);height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:1000;box-shadow:0 2px 12px rgba(0,0,0,.2)}
.eh-left{display:flex;align-items:center;gap:16px}
.eh-logo{font-family:'Quicksand',sans-serif;font-weight:700;font-size:16px;color:var(--amber);text-decoration:none;display:flex;align-items:center;gap:8px}
.eh-logo svg{opacity:.9}
.eh-sep{width:1px;height:24px;background:rgba(255,255,255,.15)}
.eh-title{font-size:14px;font-weight:600;color:rgba(255,255,255,.6)}
.eh-right{display:flex;align-items:center;gap:10px}
.btn-preview{background:rgba(255,255,255,.1);color:white;border:1px solid rgba(255,255,255,.2);padding:7px 16px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-preview:hover{background:rgba(255,255,255,.2)}
.btn-draft{background:rgba(255,187,83,.15);color:var(--amber);border:1px solid rgba(255,187,83,.3);padding:7px 16px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-draft:hover{background:rgba(255,187,83,.25)}
.btn-publish{background:var(--mint);color:var(--navy);border:none;padding:8px 20px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s}
.btn-publish:hover{background:var(--mint-d)}
.btn-publish:disabled{opacity:.5;cursor:not-allowed}

/* STATUS BAR */
.status-bar{background:white;border-bottom:1px solid var(--border);padding:8px 28px;display:flex;align-items:center;gap:12px;font-size:12px;color:var(--muted)}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--border)}
.status-dot.saved{background:var(--green);animation:none}
.status-dot.saving{background:var(--amber);animation:blink 1s infinite}
.status-dot.unsaved{background:var(--orange)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.status-text{font-weight:500}
.status-slug{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--teal);background:rgba(0,193,239,.08);padding:2px 8px;border-radius:6px;margin-left:4px}

/* TWO-PANEL LAYOUT */
.editor-wrap{display:grid;grid-template-columns:1fr 320px;min-height:calc(100vh - 58px - 36px);gap:0}

/* LEFT: WRITING AREA */
.writing-panel{padding:36px 48px 60px;background:#f0f4f8;overflow-y:auto}
.title-input{width:100%;background:transparent;border:none;outline:none;font-family:'Quicksand',sans-serif;font-weight:700;font-size:clamp(24px,4vw,36px);color:var(--navy);line-height:1.2;margin-bottom:6px;resize:none;overflow:hidden}
.title-input::placeholder{color:#b0c4ce}
.excerpt-input{width:100%;background:transparent;border:none;outline:none;font-family:'Lora',serif;font-size:16px;color:var(--muted);line-height:1.6;margin-bottom:28px;resize:none;overflow:hidden;border-bottom:1.5px solid var(--border);padding-bottom:20px}
.excerpt-input::placeholder{color:#c8d8e0}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;gap:4px;flex-wrap:wrap;background:white;border-radius:10px;padding:8px 12px;margin-bottom:20px;border:1px solid var(--border);box-shadow:0 1px 6px rgba(4,69,92,.06)}
.toolbar-btn{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border:none;background:none;border-radius:6px;cursor:pointer;font-size:14px;color:var(--text);transition:all .12s;font-family:'DM Sans',sans-serif;font-weight:600}
.toolbar-btn:hover{background:var(--light);color:var(--navy)}
.toolbar-btn.active{background:var(--navy);color:white}
.toolbar-sep{width:1px;height:22px;background:var(--border);margin:0 4px;flex-shrink:0}
.toolbar-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:0 6px}

/* CONTENT EDITOR */
.content-editor{width:100%;min-height:480px;background:white;border-radius:14px;border:1.5px solid var(--border);padding:32px 36px;font-family:'Lora',serif;font-size:16px;line-height:1.8;color:#2e4550;outline:none;transition:border-color .15s;box-shadow:0 2px 12px rgba(4,69,92,.05)}
.content-editor:focus{border-color:var(--mint)}
.content-editor h2{font-family:'Quicksand',sans-serif;font-weight:700;font-size:22px;color:var(--navy);margin:28px 0 12px}
.content-editor h3{font-family:'Quicksand',sans-serif;font-weight:700;font-size:18px;color:var(--navy);margin:22px 0 8px}
.content-editor p{margin-bottom:18px}
.content-editor ul,.content-editor ol{margin:0 0 18px 24px}
.content-editor li{margin-bottom:6px}
.content-editor blockquote{border-left:4px solid var(--mint);padding:14px 18px;margin:20px 0;background:rgba(0,216,181,.05);border-radius:0 8px 8px 0;font-style:italic;color:var(--navy)}
.content-editor a{color:var(--teal);font-weight:600}
.content-editor strong{color:var(--navy)}
.content-editor[data-placeholder]:empty::before{content:attr(data-placeholder);color:#b0c4ce;font-style:italic;pointer-events:none}

/* RIGHT: SETTINGS PANEL */
.settings-panel{background:white;border-left:1.5px solid var(--border);padding:28px 24px;overflow-y:auto;display:flex;flex-direction:column;gap:24px}
.sp-section{}
.sp-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:10px;display:block}
.sp-input{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:9px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);background:var(--light);outline:none;transition:border-color .15s}
.sp-input:focus{border-color:var(--mint);background:white}
.slug-wrap{position:relative}
.slug-prefix{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;pointer-events:none}
.sp-input.slug{padding-left:132px;font-family:'JetBrains Mono',monospace;font-size:12px}
.slug-preview{margin-top:5px;font-size:11px;color:var(--teal);font-family:'JetBrains Mono',monospace;padding:4px 8px;background:rgba(0,193,239,.06);border-radius:5px;word-break:break-all}

/* TAGS */
.tag-input-wrap{display:flex;gap:6px;align-items:center}
.tag-add-input{flex:1;padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);outline:none;background:var(--light)}
.tag-add-input:focus{border-color:var(--mint)}
.btn-tag-add{background:var(--navy);color:white;border:none;width:32px;height:32px;border-radius:8px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s}
.btn-tag-add:hover{background:var(--navy-l)}
.tags-display{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.tag-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(0,216,181,.12);color:var(--teal);border:1px solid rgba(0,216,181,.25);padding:3px 10px;border-radius:14px;font-size:12px;font-weight:600}
.tag-remove{background:none;border:none;color:var(--teal);cursor:pointer;font-size:14px;line-height:1;padding:0;opacity:.7}
.tag-remove:hover{opacity:1}

/* STATUS TOGGLE */
.status-toggle{display:grid;grid-template-columns:1fr 1fr;border-radius:9px;overflow:hidden;border:1.5px solid var(--border)}
.st-btn{padding:9px;border:none;background:var(--light);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .15s;text-align:center}
.st-btn.active.draft{background:#fff8e1;color:#b45309}
.st-btn.active.published{background:rgba(5,150,105,.1);color:var(--green)}

/* DANGER */
.btn-delete{width:100%;padding:10px;background:none;border:1.5px solid rgba(220,38,38,.25);color:var(--red);border-radius:9px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-delete:hover{background:rgba(220,38,38,.06);border-color:var(--red)}

/* MANAGE PANEL */
.manage-section{margin-top:0}
.manage-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.manage-title{font-family:'Quicksand',sans-serif;font-weight:700;font-size:15px;color:var(--navy)}
.btn-new-post{background:var(--mint);color:var(--navy);border:none;padding:7px 14px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:background .15s}
.btn-new-post:hover{background:var(--mint-d)}
.posts-list{display:flex;flex-direction:column;gap:8px}
.pl-item{background:white;border-radius:10px;border:1.5px solid var(--border);padding:12px 16px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:space-between;gap:12px}
.pl-item:hover{border-color:var(--mint)}
.pl-item.active-post{border-color:var(--orange);background:#fff8f5}
.pl-title{font-family:'Quicksand',sans-serif;font-weight:700;font-size:13px;color:var(--navy);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.pl-status{font-size:10px;font-weight:700;padding:2px 7px;border-radius:8px;flex-shrink:0}
.pl-status.published{background:rgba(5,150,105,.12);color:var(--green)}
.pl-status.draft{background:rgba(255,187,83,.2);color:#b45309}

/* TOAST */
.toast{position:fixed;bottom:28px;right:28px;background:var(--navy);color:white;padding:12px 20px;border-radius:12px;font-size:14px;font-weight:600;box-shadow:0 8px 28px rgba(0,0,0,.25);z-index:9999;transform:translateY(16px);opacity:0;transition:all .25s;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}
.toast.success{background:var(--green)}
.toast.error{background:var(--red)}

/* PREVIEW MODAL */
.preview-overlay{position:fixed;inset:0;background:rgba(4,69,92,.7);z-index:3000;overflow-y:auto;padding:40px 20px;display:none}
.preview-overlay.open{display:block}
.preview-inner{max-width:760px;margin:0 auto}
.preview-bar{display:flex;align-items:center;justify-content:space-between;background:var(--navy);border-radius:12px 12px 0 0;padding:14px 20px}
.preview-bar span{color:rgba(255,255,255,.7);font-size:13px;font-weight:600}
.btn-close-preview{background:rgba(255,255,255,.15);color:white;border:none;padding:7px 16px;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer}
.preview-content{background:white;border-radius:0 0 14px 14px;padding:48px 52px}
.preview-title{font-family:'Quicksand',sans-serif;font-weight:700;font-size:clamp(24px,4vw,38px);color:var(--navy);margin-bottom:10px}
.preview-meta{font-size:13px;color:var(--muted);margin-bottom:32px;padding-bottom:20px;border-bottom:1.5px solid var(--border)}
.preview-body h2{font-family:'Quicksand',sans-serif;font-weight:700;font-size:22px;color:var(--navy);margin:32px 0 14px}
.preview-body h3{font-family:'Quicksand',sans-serif;font-weight:700;font-size:18px;color:var(--navy);margin:24px 0 10px}
.preview-body p{font-family:'Lora',serif;font-size:16px;line-height:1.8;color:#2e4550;margin-bottom:18px}
.preview-body ul,.preview-body ol{font-family:'Lora',serif;font-size:16px;line-height:1.8;color:#2e4550;margin:0 0 18px 24px}
.preview-body li{margin-bottom:6px}
.preview-body a{color:var(--teal);font-weight:600}
.preview-body blockquote{border-left:4px solid var(--mint);padding:14px 18px;margin:20px 0;background:rgba(0,216,181,.05);border-radius:0 8px 8px 0;font-style:italic}

@media(max-width:900px){
  .editor-wrap{grid-template-columns:1fr}
  .settings-panel{border-left:none;border-top:1.5px solid var(--border);order:2}
  .writing-panel{padding:24px 18px 40px}
  .content-editor{padding:22px 20px}
  .preview-content{padding:28px 20px}
}
</style>
</head>
<body>

<!-- EDITOR HEADER -->
<header class="editor-header">
  <div class="eh-left">
    <a class="eh-logo" href="/pages/blog">
      <svg width="18" height="22" viewBox="0 0 18 22" xmlns="http://www.w3.org/2000/svg"><path d="M9 0C4.03 0 0 4.03 0 9c0 6.75 9 13 9 13s9-6.25 9-13c0-4.97-4.03-9-9-9z" fill="#ffbb53"/><circle cx="9" cy="9" r="3.5" fill="#04455c"/></svg>
      ZWNM Blog
    </a>
    <div class="eh-sep"></div>
    <span class="eh-title" id="editorModeLabel">New post</span>
  </div>
  <div class="eh-right">
    <button class="btn-preview" onclick="openPreview()">👁 Preview</button>
    <button class="btn-draft" onclick="savePost('draft')" id="btnDraft">Save draft</button>
    <button class="btn-publish" onclick="savePost('published')" id="btnPublish">Publish →</button>
  </div>
</header>

<!-- STATUS BAR -->
<div class="status-bar">
  <div class="status-dot" id="statusDot"></div>
  <span class="status-text" id="statusText">Not saved yet</span>
  <span class="status-slug" id="statusSlug" style="display:none"></span>
</div>

<!-- EDITOR + SIDEBAR -->
<div class="editor-wrap">

  <!-- WRITING PANEL -->
  <div class="writing-panel">
    <textarea class="title-input" id="titleInput" placeholder="Your post title…" rows="1" oninput="onTitleChange();autoResize(this)"></textarea>
    <textarea class="excerpt-input" id="excerptInput" placeholder="Write a short excerpt or summary…" rows="2" oninput="autoResize(this)"></textarea>

    <!-- TOOLBAR -->
    <div class="toolbar">
      <span class="toolbar-label">Format</span>
      <button class="toolbar-btn" title="Heading 2" onclick="execCmd('formatBlock','h2')"><b>H2</b></button>
      <button class="toolbar-btn" title="Heading 3" onclick="execCmd('formatBlock','h3')"><b>H3</b></button>
      <div class="toolbar-sep"></div>
      <button class="toolbar-btn" title="Bold" onclick="execCmd('bold')"><b>B</b></button>
      <button class="toolbar-btn" title="Italic" onclick="execCmd('italic')"><i>I</i></button>
      <button class="toolbar-btn" title="Underline" onclick="execCmd('underline')"><u>U</u></button>
      <div class="toolbar-sep"></div>
      <button class="toolbar-btn" title="Unordered list" onclick="execCmd('insertUnorderedList')">• List</button>
      <button class="toolbar-btn" title="Ordered list" onclick="execCmd('insertOrderedList')">1. List</button>
      <div class="toolbar-sep"></div>
      <button class="toolbar-btn" title="Blockquote" onclick="insertBlockquote()">❝</button>
      <button class="toolbar-btn" title="Link" onclick="insertLink()">🔗</button>
      <button class="toolbar-btn" title="Horizontal rule" onclick="execCmd('insertHorizontalRule')">—</button>
      <div class="toolbar-sep"></div>
      <button class="toolbar-btn" title="Remove formatting" onclick="execCmd('removeFormat')">✕ fmt</button>
    </div>

    <div
      class="content-editor"
      id="contentEditor"
      contenteditable="true"
      data-placeholder="Start writing your post here…"
      oninput="onContentChange()"
    ></div>
  </div>

  <!-- SETTINGS PANEL -->
  <div class="settings-panel">

    <div class="sp-section">
      <span class="sp-label">URL Slug</span>
      <div class="slug-wrap">
        <span class="slug-prefix">/pages/blog/</span>
        <input class="sp-input slug" type="text" id="slugInput" placeholder="my-post-title" oninput="onSlugEdit()">
      </div>
      <div class="slug-preview" id="slugPreview"></div>
    </div>

    <div class="sp-section">
      <span class="sp-label">Author</span>
      <input class="sp-input" type="text" id="authorInput" value="Zero Waste Near Me" placeholder="Your name">
    </div>

    <div class="sp-section">
      <span class="sp-label">Tags</span>
      <div class="tag-input-wrap">
        <input class="tag-add-input" type="text" id="tagInput" placeholder="Add a tag…" onkeydown="if(event.key==='Enter'){event.preventDefault();addTag();}">
        <button class="btn-tag-add" onclick="addTag()">+</button>
      </div>
      <div class="tags-display" id="tagsDisplay"></div>
    </div>

    <div class="sp-section">
      <span class="sp-label">Status</span>
      <div class="status-toggle">
        <button class="st-btn active draft" id="stDraft" onclick="setStatus('draft')">Draft</button>
        <button class="st-btn published" id="stPublished" onclick="setStatus('published')">Published</button>
      </div>
    </div>

    <div class="sp-section" id="deleteSection" style="display:none">
      <button class="btn-delete" onclick="deletePost()">🗑 Delete this post</button>
    </div>

    <hr style="border:none;border-top:1.5px solid var(--border)">

    <!-- ALL POSTS LIST -->
    <div class="manage-section">
      <div class="manage-header">
        <span class="manage-title">All Posts</span>
        <button class="btn-new-post" onclick="newPost()">+ New</button>
      </div>
      <div class="posts-list" id="postsList">
        <div style="font-size:13px;color:var(--muted)">Loading…</div>
      </div>
    </div>

  </div>
</div>

<!-- PREVIEW OVERLAY -->
<div class="preview-overlay" id="previewOverlay">
  <div class="preview-inner">
    <div class="preview-bar">
      <span>Preview</span>
      <button class="btn-close-preview" onclick="closePreview()">✕ Close</button>
    </div>
    <div class="preview-content">
      <div id="previewTitle" class="preview-title"></div>
      <div id="previewMeta" class="preview-meta"></div>
      <div id="previewBody" class="preview-body"></div>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL='https://xmrqlhkneffuqdibqrjj.supabase.co';
const SUPABASE_KEY='sb_publishable_AV8VQGAwXuUT9PjiBYlWkA_f1z_J6RI';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

let currentPostId=null;
let tags=[];
let postStatus='draft';
let slugManuallyEdited=false;
let saveTimer=null;
let isDirty=false;

// ── TOOLBAR ──────────────────────────────────────────────
function execCmd(cmd,val){document.execCommand(cmd,false,val||null);document.getElementById('contentEditor').focus();}
function insertBlockquote(){
  const sel=window.getSelection();
  const text=sel.toString()||'Quote goes here';
  execCmd('insertHTML',`<blockquote><p>${text}</p></blockquote><p></p>`);
}
function insertLink(){
  const url=prompt('Enter URL:','https://');
  if(url){const text=window.getSelection().toString()||url;execCmd('insertHTML',`<a href="${url}">${text}</a>`);}
}
function autoResize(el){el.style.height='auto';el.style.height=(el.scrollHeight)+'px';}

// ── SLUG ─────────────────────────────────────────────────
function toSlug(str){return str.toLowerCase().replace(/[^a-z0-9\s-]/g,'').trim().replace(/\s+/g,'-').replace(/-+/g,'-').substring(0,80);}

function onTitleChange(){
  autoResize(document.getElementById('titleInput'));
  if(!slugManuallyEdited){
    const slug=toSlug(document.getElementById('titleInput').value);
    document.getElementById('slugInput').value=slug;
    updateSlugPreview(slug);
    document.getElementById('editorModeLabel').textContent=document.getElementById('titleInput').value||'New post';
  }
  markDirty();
}

function onSlugEdit(){slugManuallyEdited=true;updateSlugPreview(document.getElementById('slugInput').value);markDirty();}
function updateSlugPreview(slug){
  const el=document.getElementById('slugPreview');
  const statusSlug=document.getElementById('statusSlug');
  el.textContent=slug?`zerowastenear.me/pages/blog/${slug}`:'';
  statusSlug.textContent=slug?`/pages/blog/${slug}`:'';
  statusSlug.style.display=slug?'inline':'none';
}

function onContentChange(){markDirty();}

// ── DIRTY / AUTO-SAVE ────────────────────────────────────
function markDirty(){
  isDirty=true;
  setStatus2('unsaved','Unsaved changes');
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>savePost(postStatus,true),30000); // auto-save every 30s
}
function setStatus2(state,text){
  document.getElementById('statusDot').className='status-dot '+state;
  document.getElementById('statusText').textContent=text;
}

// ── TAGS ─────────────────────────────────────────────────
function addTag(){
  const v=document.getElementById('tagInput').value.trim().toLowerCase();
  if(!v||tags.includes(v))return;
  tags.push(v);
  document.getElementById('tagInput').value='';
  renderTags();markDirty();
}
function removeTag(t){tags=tags.filter(x=>x!==t);renderTags();markDirty();}
function renderTags(){
  document.getElementById('tagsDisplay').innerHTML=tags.map(t=>`<span class="tag-badge">${t}<button class="tag-remove" onclick="removeTag('${t}')">×</button></span>`).join('');
}

// ── STATUS TOGGLE ─────────────────────────────────────────
function setStatus(s){
  postStatus=s;
  document.getElementById('stDraft').classList.toggle('active',s==='draft');
  document.getElementById('stPublished').classList.toggle('active',s==='published');
}

// ── SAVE ─────────────────────────────────────────────────
async function savePost(status,silent=false){
  const title=document.getElementById('titleInput').value.trim();
  const slug=document.getElementById('slugInput').value.trim();
  if(!title){showToast('Please add a title first.','error');return;}
  if(!slug){showToast('Please add a URL slug.','error');return;}

  setStatus2('saving','Saving…');
  const{btnDraft,btnPublish}=getBtns();
  btnDraft.disabled=true;btnPublish.disabled=true;

  const payload={
    title,slug,
    excerpt:document.getElementById('excerptInput').value.trim()||null,
    content:document.getElementById('contentEditor').innerHTML,
    author:document.getElementById('authorInput').value.trim()||'Zero Waste Near Me',
    tags:tags.length?tags:null,
    status,
    published_at:status==='published'?new Date().toISOString():null,
  };

  try{
    let error;
    if(currentPostId){
      ({error}=await sb.from('blog_posts').update(payload).eq('id',currentPostId));
    } else {
      const{data,error:e}=await sb.from('blog_posts').insert(payload).select().single();
      error=e;
      if(data){currentPostId=data.id;document.getElementById('deleteSection').style.display='block';}
    }
    if(error)throw error;

    postStatus=status;setStatus(status);
    isDirty=false;
    setStatus2('saved',status==='published'?'Published':'Draft saved');
    if(!silent)showToast(status==='published'?'Post published! 🎉':'Draft saved ✓','success');
    document.getElementById('editorModeLabel').textContent='Editing: '+title;
    loadPostsList();
  }catch(e){
    setStatus2('unsaved','Save failed');
    if(!silent)showToast('Error: '+e.message,'error');
  }finally{
    btnDraft.disabled=false;btnPublish.disabled=false;
  }
}

function getBtns(){return{btnDraft:document.getElementById('btnDraft'),btnPublish:document.getElementById('btnPublish')};}

// ── DELETE ────────────────────────────────────────────────
async function deletePost(){
  if(!currentPostId){showToast('Nothing to delete.','error');return;}
  if(!confirm('Delete this post permanently? This cannot be undone.'))return;
  const{error}=await sb.from('blog_posts').delete().eq('id',currentPostId);
  if(error){showToast('Delete failed: '+error.message,'error');return;}
  showToast('Post deleted.','success');
  newPost();loadPostsList();
}

// ── LOAD POST FOR EDITING ─────────────────────────────────
async function loadPostForEdit(id){
  const{data,error}=await sb.from('blog_posts').select('*').eq('id',id).single();
  if(error||!data){showToast('Could not load post.','error');return;}
  currentPostId=data.id;
  slugManuallyEdited=true;
  tags=data.tags||[];
  postStatus=data.status||'draft';

  document.getElementById('titleInput').value=data.title||'';
  document.getElementById('excerptInput').value=data.excerpt||'';
  document.getElementById('slugInput').value=data.slug||'';
  document.getElementById('authorInput').value=data.author||'Zero Waste Near Me';
  document.getElementById('contentEditor').innerHTML=data.content||'';
  document.getElementById('editorModeLabel').textContent='Editing: '+(data.title||'post');
  document.getElementById('deleteSection').style.display='block';

  autoResize(document.getElementById('titleInput'));
  autoResize(document.getElementById('excerptInput'));
  renderTags();
  setStatus(postStatus);
  updateSlugPreview(data.slug);
  setStatus2('saved',data.status==='published'?'Published':'Draft');
  isDirty=false;
  // Highlight in list
  document.querySelectorAll('.pl-item').forEach(el=>el.classList.toggle('active-post',el.dataset.id==id));
  window.scrollTo({top:0,behavior:'smooth'});
}

// ── NEW POST ──────────────────────────────────────────────
function newPost(){
  currentPostId=null;slugManuallyEdited=false;tags=[];postStatus='draft';isDirty=false;
  document.getElementById('titleInput').value='';
  document.getElementById('excerptInput').value='';
  document.getElementById('slugInput').value='';
  document.getElementById('authorInput').value='Zero Waste Near Me';
  document.getElementById('contentEditor').innerHTML='';
  document.getElementById('editorModeLabel').textContent='New post';
  document.getElementById('deleteSection').style.display='none';
  document.getElementById('slugPreview').textContent='';
  document.getElementById('statusSlug').style.display='none';
  renderTags();setStatus('draft');
  setStatus2('','Not saved yet');
  document.querySelectorAll('.pl-item').forEach(el=>el.classList.remove('active-post'));
  document.getElementById('titleInput').focus();
  window.scrollTo({top:0,behavior:'smooth'});
}

// ── POSTS LIST ────────────────────────────────────────────
async function loadPostsList(){
  const{data}=await sb.from('blog_posts').select('id,title,status').order('created_at',{ascending:false});
  const wrap=document.getElementById('postsList');
  if(!data||!data.length){wrap.innerHTML='<div style="font-size:13px;color:var(--muted)">No posts yet.</div>';return;}
  wrap.innerHTML=data.map(p=>`
    <div class="pl-item${p.id===currentPostId?' active-post':''}" data-id="${p.id}" onclick="loadPostForEdit(${p.id})">
      <span class="pl-title">${p.title||'Untitled'}</span>
      <span class="pl-status ${p.status}">${p.status}</span>
    </div>`).join('');
}

// ── PREVIEW ───────────────────────────────────────────────
function openPreview(){
  document.getElementById('previewTitle').textContent=document.getElementById('titleInput').value||'Untitled';
  document.getElementById('previewMeta').textContent='By '+(document.getElementById('authorInput').value||'Zero Waste Near Me')+' · Preview';
  document.getElementById('previewBody').innerHTML=document.getElementById('contentEditor').innerHTML||'<p><em>No content yet.</em></p>';
  document.getElementById('previewOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closePreview(){document.getElementById('previewOverlay').classList.remove('open');document.body.style.overflow='';}

// ── TOAST ─────────────────────────────────────────────────
let toastTimer;
function showToast(msg,type=''){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.className='toast '+type+' show';
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),3500);
}

// ── INIT ─────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded',()=>{
  loadPostsList();
  // Check if ?edit=ID in URL
  const params=new URLSearchParams(window.location.search);
  if(params.get('edit'))loadPostForEdit(parseInt(params.get('edit')));
});

// Warn before leaving with unsaved changes
window.addEventListener('beforeunload',e=>{
  if(isDirty){e.preventDefault();e.returnValue='';}
});
</script>
